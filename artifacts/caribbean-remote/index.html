<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- CSP: frame-ancestors is ignored in meta tags (HTTP header only) — enforced by the
         hosting layer and the dev/preview server via securityHeadersPlugin in vite.config.ts. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://*.clerk.accounts.dev https://clerk.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://img.clerk.com https://images.clerk.dev https://*.googleusercontent.com; connect-src 'self' https://*.clerk.accounts.dev wss://*.clerk.accounts.dev https://challenges.cloudflare.com https://clerk.com; worker-src 'self' blob:; frame-src https://challenges.cloudflare.com https://*.clerk.accounts.dev; frame-ancestors 'self'; form-action 'self' https://*.clerk.accounts.dev https://clerk.com https://accounts.google.com; object-src 'none'; base-uri 'self';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="theme-color" content="#0c8aa3" />

    <!-- Default meta — kept in sync with src/lib/seo.ts. Per-page SEO is set by useSeo. -->
    <title>CaribRemotejobs.com — Remote Jobs for the Caribbean</title>
    <meta name="description" content="Find remote jobs open to Caribbean-based talent. Browse hundreds of roles across engineering, design, marketing, and more." />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <link rel="canonical" href="https://caribremotejobs.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="CaribRemotejobs.com" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://caribremotejobs.com/" />
    <meta property="og:title" content="CaribRemotejobs.com — Remote Jobs for the Caribbean" />
    <meta property="og:description" content="Find remote jobs open to Caribbean-based talent. Browse hundreds of roles across engineering, design, marketing, and more." />
    <meta property="og:image" content="https://caribremotejobs.com/og-image.png" />
    <meta property="og:image:width" content="1408" />
    <meta property="og:image:height" content="768" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CaribRemotejobs.com — Remote Jobs for the Caribbean" />
    <meta name="twitter:description" content="Find remote jobs open to Caribbean-based talent. Browse hundreds of roles across engineering, design, marketing, and more." />
    <meta name="twitter:image" content="https://caribremotejobs.com/og-image.png" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Cloudflare Turnstile CAPTCHA -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Site-level structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CaribRemotejobs.com",
      "url": "https://caribremotejobs.com/",
      "description": "Remote job board for Caribbean-based talent.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://caribremotejobs.com/jobs?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CaribRemotejobs.com",
      "url": "https://caribremotejobs.com/",
      "logo": "https://caribremotejobs.com/logo.png",
      "email": "hello@caribremotejobs.com",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
