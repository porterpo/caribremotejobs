kind = "web"
previewPath = "/"
title = "CaribbeanRemote"
version = "1.0.0"
id = "artifacts/caribbean-remote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18968

[services.development]
run = "pnpm --filter @workspace/caribbean-remote run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caribbean-remote", "run", "build" ]
publicDir = "artifacts/caribbean-remote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18968"
BASE_PATH = "/"
